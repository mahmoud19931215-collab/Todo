<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2b7a78">
    <title>متجر حلب للتوصيل</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="animated-bg">
        <div class="day-scene">
            <div class="sun"></div>
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
            <div class="cloud c3"></div>
        </div>
        <div class="night-scene" style="display:none;">
            <div class="moon"></div>
            <div class="stars">
                <div class="star"></div><div class="star"></div><div class="star"></div>
            </div>
        </div>
    </div>

    <div id="offlineBanner" class="network-offline-banner" style="display: none;">
        <i class="fas fa-wifi-slash"></i> تصفح بدون إنترنت حالياً - يتم العرض من الكاش المحلي الآمن
    </div>

    <header class="main-header">
        <div class="header-top">
            <h1 class="store-logo">حلب للتوصيل</h1>
            <div class="header-actions">
                <button id="themeToggle" class="icon-btn" aria-label="تغيير الوضع البصري">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="settingsBtn" class="icon-btn" aria-label="الإعدادات">
                    <i class="fas fa-cog"></i>
                </button>
                <button id="cartDrawerBtn" class="icon-btn cart-btn-container" aria-label="فتح السلة">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cartBadge" class="cart-badge" style="display: none;">0</span>
                </button>
            </div>
        </div>
        
        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن الحليب، الحفاضات، المنظفات...">
                <button id="clearSearch" class="clear-search-btn" style="display: none;">&times;</button>
            </div>
            <button id="refreshBtn" class="refresh-action-btn" aria-label="تحديث البيانات">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <div id="mainCategoriesContainer" class="categories-chips-scroll"></div>
        <div id="subCategoriesContainer" class="sub-categories-chips-scroll" style="display: none;"></div>
    </header>

    <main class="main-content">
        <div id="productsGrid" class="products-grid-container"></div>
    </main>

    <div id="cartDrawer" class="cart-drawer-sidebar">
        <div class="drawer-header">
            <h2>سلة المشتريات</h2>
            <button id="cartCloseBtn" class="drawer-close-x" aria-label="إغلاق">&times;</button>
        </div>
        <div id="cartItemsList" class="drawer-body">
            </div>
        <div class="drawer-footer">
            <div class="drawer-total-row">
                <span>إجمالي الطلب:</span>
                <span id="drawerTotal">0 ل.س</span>
            </div>
            <button id="cartWhatsappBtn" class="whatsapp-submit-btn" disabled>
                إرسال الطلب عبر الواتساب <i class="fab fa-whatsapp"></i>
            </button>
        </div>
    </div>
    <div id="cartOverlay" class="drawer-overlay-dim"></div>

    <div id="settingsModal" class="modal-overlay-container">
        <div class="modal-content-card">
            <div class="modal-card-header">
                <h3>إعدادات النظام</h3>
                <button id="closeModalBtn" class="modal-close-x" aria-label="إغلاق">&times;</button>
            </div>
            <div class="modal-card-body">
                <button id="clearCacheBtn" class="action-danger-btn">
                    <i class="fas fa-trash-alt"></i> مسح كاش الصور والمنتجات
                </button>
                <p class="settings-hint">سيتم حذف كافة البيانات والصور المخزنة محلياً وإجبار المتصفح على تحميل بيانات جديدة من السيرفر.</p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] Service Worker registered successfully with scope:', reg.scope))
                    .catch(err => console.error('[PWA] Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
